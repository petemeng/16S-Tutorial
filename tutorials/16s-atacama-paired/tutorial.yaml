id: sixteen-s-atacama-paired
slug: sixteen-s-atacama-paired
title: Atacama soils 双端 16S 微生物组最佳实践教程
problem_statement: >
  用 QIIME2 官方 Atacama soils paired-end 数据集，演示从 EMP 双端原始 FASTQ、
  解复用、DADA2 去噪、Silva 物种注释、系统发育树构建到 alpha/beta 多样性分析的
  一条可执行 16S 扩增子主线，并把 GitHub/WeChat 发布输出固定到同一份教程契约里。
audience:
  level: 科研初中级
  summary: >
    适合已经知道 16S 可以回答“样本里有哪些微生物”，但还没有把 paired-end EMP 数据、
    QIIME2 artifact、DADA2 参数选择和多样性统计整成一条稳定流程的读者。
language:
  primary: zh-CN
  terminology: en
covers:
  - 下载并校验 Atacama soils 双端 16S 元数据、barcode FASTQ 和 forward/reverse FASTQ
  - 用 QIIME2 导入 EMPPairedEndSequences、解复用并过滤低深度样本
  - 用 DADA2 对 54 个样本做 paired-end 去噪并输出 ASV 表与代表序列
  - 用 Silva 138 分类器做物种注释、构建系统发育树并过滤非目标/极低丰度 ASV
  - 在抽平深度 500 下完成 alpha/beta 多样性和 PERMANOVA 检验
prerequisites:
  - 能在 Linux shell 中执行命令并理解相对路径
  - 理解 FASTQ、metadata、feature table、taxonomy annotation 等基础概念
  - 服务器已安装 Conda，并已创建 `qiime2-amplicon-2024.5` 环境
  - 机器至少具备 8 CPU threads、32 GB RAM 和足够磁盘空间存放原始 reads 与 QIIME2 产物
workflow_overview:
  - 下载官方 metadata、paired-end FASTQ 和预训练 Silva 分类器
  - 导入 EMPPairedEndSequences，按 barcode 解复用并用 30% subsample 快速检查质量
  - 按 `trim-left=13` 和 `trunc-len=150` 跑 DADA2 paired-end 去噪
  - 生成 taxonomy、taxa barplot、rooted tree，并完成氯oplast/线粒体及 singleton 过滤
  - 计算 alpha rarefaction、core metrics、alpha group significance 和 PERMANOVA
results_check:
  - 元数据样本总数应为 75，transect-name 分布应为 Yungay 43、Baquedano 32
  - 过滤后进入 DADA2 的样本数应为 54，初始 ASV 数应为 1080
  - 线粒体/叶绿体和 singleton 过滤后应保留 1078 个 ASV
  - sampling depth 500 时应保留 48 个样本，并可生成 Bray-Curtis PCoA 与 Shannon group significance
troubleshooting:
  - 如果 `qiime demux emp-paired` 报 barcode 错误，先确认 metadata 中 `barcode-sequence` 列和 `--p-rev-comp-mapping-barcodes` 参数是否匹配建库方案
  - 如果 DADA2 merged reads 暴跌，先检查 `trim-left`/`trunc-len` 是否让 V4 区重叠长度不足
  - 如果 `core-metrics-phylogenetic` 太慢，先确认过滤后的 ASV 数量和 sampling depth 是否合理，再考虑减少线程争用
reproducibility:
  strategy:
    - 所有关键中间产物都保留为 `.qza` 或 `.qzv`，依赖 QIIME2 provenance 记录上游参数
    - paired-end DADA2、taxonomy、tree 和 diversity 结果均可从同一份 metadata 与 FASTQ 重新生成
  rerun_key:
    - 数据版本固定为 Atacama soils 2024.5 paired-end tutorial assets
    - QIIME2 环境固定为 `qiime2-amplicon-2024.5`
    - 双端去噪参数固定为 `trim-left-f/r=13`、`trunc-len-f/r=150`
  provenance:
    - "`data/demux.qza`、`results/table.qza`、`results/taxonomy.qza`、`results/tree/rooted-tree.qza` 都带完整 QIIME2 provenance"
    - GitHub 站点与 WeChat 草稿都从 `ref/16s/[1-5].md` 同步渲染
data_sources:
  dataset_version: atacama-soils-paired-2024.5-v1
  items:
